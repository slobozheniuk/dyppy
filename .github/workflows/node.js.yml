# Dyppy CI
# Runs in two independent jobs matching the repo's two modules.

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── nwtfv-sync: Vitest unit + integration tests ──────────────────────────────
  nwtfv-sync:
    name: nwtfv-sync tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: nwtfv-sync/package-lock.json

      - name: Install dependencies
        working-directory: nwtfv-sync
        run: npm ci

      - name: Generate Prisma client
        working-directory: nwtfv-sync
        run: npx prisma generate

      - name: Run tests
        working-directory: nwtfv-sync
        run: npm test

  # ── frontend: build + Playwright e2e ─────────────────────────────────────────
  frontend:
    name: frontend build & e2e
    runs-on: ubuntu-latest

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run e2e tests
        working-directory: frontend
        run: npm test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
